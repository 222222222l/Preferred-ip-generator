name = "preferred-ip-generator-v2"
main = "src/index.js"
compatibility_date = "2026-05-30"
keep_vars = false

[triggers]
crons = ["*/30 * * * *"]

[[kv_namespaces]]
binding = "BEST_IP_KV"
id = "replace-with-your-kv-namespace-id"
preview_id = "replace-with-your-preview-kv-namespace-id"

[vars]
SOURCE_URL = "https://api.uouin.com/index.php/index/Cloudflare"
SOURCE_URLS = "https://api.uouin.com/index.php/index/Cloudflare,https://www.wetest.vip/api/cf2dns/get_cloudflare_ip,https://api.hostmonit.com/get_optimization_ip,https://raw.githubusercontent.com/ymyuuu/IPDB/main/bestcf.txt"
MAX_RESULTS = "10"
MIN_BANDWIDTH_MB = "20"
INCLUDE_IPV6 = "false"
LINE_ALLOWLIST = ""
PORT_CANDIDATES = "443,8443,2053,2083,2087,2096"
FALLBACK_PORT = "443"
REFRESH_INTERVAL_MINUTES = "180"
SOURCE_FRESHNESS_HOURS = "24"
REMARK_PREFIX = "CF"
PORT_PROBE_HOST = ""
CF2DNS_KEY = "o1zrmHAF"
SUBSCRIPTION_UPSTREAM = ""
REFRESH_TOKEN = ""
